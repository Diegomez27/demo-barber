<section class="hero" id="top">
  <img
    class="hero__bg"
    [src]="heroSrc"
    [srcset]="heroSrcset"
    sizes="100vw"
    width="1600"
    height="2000"
    fetchpriority="high"
    decoding="async"
    alt="Interior de NAVAJA: sillas de barbero en piel negra bajo luz cálida"
  />
  <div class="hero__scrim"></div>

  <div class="hero__inner shell">
    <p class="kicker hero__kicker">Roma Norte · Ciudad de México</p>

    <h1 class="display hero__title">
      <span>Donde el corte</span>
      <span>es <em>oficio</em></span>
    </h1>

    <p class="lead hero__lead">
      Fades de precisión, barba a navaja y afeitado clásico. Sin prisa, sin
      atajos — solo el filo en manos que llevan años haciéndolo bien.
    </p>

    <div class="hero__actions">
      <a class="btn btn--gold" [href]="wa" target="_blank" rel="noopener">
        <svg class="btn__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M12.04 2a9.9 9.9 0 0 0-8.5 14.96L2 22l5.2-1.36A9.9 9.9 0 1 0 12.04 2Zm0 1.8a8.1 8.1 0 1 1-4.13 15.06l-.3-.18-3.08.8.82-3-.2-.31A8.1 8.1 0 0 1 12.04 3.8Zm-3.2 4.3c-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2s.86 2.32.98 2.48c.12.16 1.7 2.7 4.16 3.68 2.06.82 2.48.66 2.92.62.44-.04 1.44-.58 1.64-1.16.2-.58.2-1.06.14-1.16-.06-.1-.22-.16-.46-.28-.24-.12-1.44-.7-1.66-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1.02-.38-1.94-1.2-.72-.64-1.2-1.42-1.34-1.66-.14-.24-.02-.36.1-.48.1-.1.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.32-.74-1.8-.2-.46-.4-.4-.54-.4Z"
          />
        </svg>
        Agendar por WhatsApp
      </a>
      <a class="btn btn--ghost" href="#servicios">Ver servicios</a>
    </div>

    <dl class="hero__meta">
      <div class="hero__meta-item">
        <dt>Desde</dt>
        <dd>2014</dd>
      </div>
      <div class="hero__meta-item">
        <dt>Barberos</dt>
        <dd>4 de planta</dd>
      </div>
      <div class="hero__meta-item">
        <dt>Sin cita</dt>
        <dd>Walk-ins</dd>
      </div>
    </dl>
  </div>

  <a class="hero__scroll" href="#servicios" aria-label="Bajar a servicios">
    <span>Desliza</span>
    <span class="hero__scroll-line" aria-hidden="true"></span>
  </a>
</section>
