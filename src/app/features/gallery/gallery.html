<section class="gallery section" id="galeria">
  <div class="shell">
    <header class="gallery__head" data-reveal>
      <div>
        <p class="kicker">El trabajo</p>
        <h2 class="display gallery__title">Hablamos con tijera</h2>
      </div>

    </header>

    <div class="masonry">
      @for (shot of shots; track shot.id; let i = $index) {
        <figure class="masonry__item" [data-reveal]="(i % 3) * 90">
          <img
            [src]="src(shot)"
            [srcset]="srcsetFor(shot)"
            sizes="(min-width: 880px) 30vw, (min-width: 560px) 45vw, 90vw"
            [width]="shot.w"
            [height]="shot.h"
            loading="lazy"
            decoding="async"
            [alt]="shot.alt"
          />
        </figure>
      }
    </div>
  </div>
</section>
