<section class="team section" id="equipo">
  <div class="shell">
    <header class="team__head" data-reveal>
      <p class="kicker">La gente</p>
      <h2 class="display team__title">Quién sostiene la navaja</h2>
      <p class="lead">
        Puedes pedir tu
        barbero por nombre al agendar.
      </p>
    </header>

    <ul class="team__grid">
      @for (b of team; track b.name; let i = $index) {
      <li class="barber" [data-reveal]="i * 80">
        <figure class="barber__photo">
          <img [src]="src(b)" [srcset]="srcsetFor(b)" sizes="(min-width: 880px) 22vw, 44vw" width="600" height="800"
            loading="lazy" decoding="async" [alt]="'Retrato de ' + b.name + ', ' + b.specialty" />
          <figcaption class="barber__caption">
            <span class="barber__alias">«{{ b.alias }}»</span>
            <h3 class="barber__name">{{ b.name }}</h3>
            <p class="barber__specialty">{{ b.specialty }}</p>
            <span class="barber__ig">{{ b.instagram }}</span>
          </figcaption>
        </figure>
      </li>
      }
    </ul>
  </div>
</section>
