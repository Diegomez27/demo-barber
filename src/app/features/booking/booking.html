<section class="booking" id="reservar">
  <img
    class="booking__bg"
    [src]="bg"
    [srcset]="bgSrcset"
    sizes="100vw"
    width="1400"
    height="900"
    loading="lazy"
    decoding="async"
    alt=""
    aria-hidden="true"
  />
  <div class="booking__scrim"></div>

  <div class="shell booking__inner" data-reveal>
    <p class="kicker">Aparta tu silla</p>
    <h2 class="display booking__title">
      Una navaja libre<br />te está esperando
    </h2>
    <p class="lead booking__lead">
      Escríbenos por WhatsApp y agendamos en menos de un minuto. También
      atendemos sin cita, según disponibilidad del día.
    </p>

    <div class="booking__actions">
      <a class="btn btn--wa booking__cta" [href]="wa" target="_blank" rel="noopener">
        <svg class="btn__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M12.04 2a9.9 9.9 0 0 0-8.5 14.96L2 22l5.2-1.36A9.9 9.9 0 1 0 12.04 2Zm0 1.8a8.1 8.1 0 1 1-4.13 15.06l-.3-.18-3.08.8.82-3-.2-.31A8.1 8.1 0 0 1 12.04 3.8Zm-3.2 4.3c-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2s.86 2.32.98 2.48c.12.16 1.7 2.7 4.16 3.68 2.06.82 2.48.66 2.92.62.44-.04 1.44-.58 1.64-1.16.2-.58.2-1.06.14-1.16-.06-.1-.22-.16-.46-.28-.24-.12-1.44-.7-1.66-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1.02-.38-1.94-1.2-.72-.64-1.2-1.42-1.34-1.66-.14-.24-.02-.36.1-.48.1-.1.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.32-.74-1.8-.2-.46-.4-.4-.54-.4Z"
          />
        </svg>
        {{ biz.phoneDisplay }}
      </a>
      <p class="booking__hint">Respuesta típica en minutos</p>
    </div>
  </div>
</section>
